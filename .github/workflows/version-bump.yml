name: Version Bump

on:
  workflow_dispatch:
    inputs:
      increment:
        type: choice
        description: 'Version increment (patch, minor, major)'
        options: 
        - patch
        - minor
        - mayor
        required: true
        default: 'patch'

jobs:
  bump:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0  # ensure full history for Commitizen

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: abatilo/actions-poetry@v3

      - name: Install dependencies
        run: poetry install --no-root --no-interaction

      - name: Run Commitizen bump and generate changelog
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          
          poetry run cz bump --yes --increment ${{ github.event.inputs.increment }} --changelog

          git push origin HEAD:main
          git push --tags

